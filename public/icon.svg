<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    <!-- Shield Outline Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffe4e6" stop-opacity="0.3" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Maskable / Circular safe background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer ambient glow -->
  <circle cx="256" cy="256" r="160" fill="#ffffff" opacity="0.08" filter="url(#glow)" />

  <!-- Shield Shape -->
  <path d="M256 100 C 310 100, 390 120, 390 180 C 390 280, 290 370, 256 410 C 222 370, 122 280, 122 180 C 122 120, 202 100, 256 100 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Inner solid shield style -->
  <path d="M256 120 C 300 120, 370 137, 370 180 C 370 265, 280 350, 256 385 C 232 350, 142 265, 142 180 C 142 137, 212 120, 256 120 Z" 
        fill="rgba(255, 255, 255, 0.08)" />

  <!-- Female / Heart symbol in center -->
  <g transform="translate(256, 230)">
    <!-- Heart shape (representing protection & care) -->
    <path d="M0 -45 C 22 -75, 55 -45, 55 -12 C 55 20, 15 48, 0 68 C -15 48, -55 20, -55 -12 C -55 -45, -22 -75, 0 -45 Z" 
          fill="#ffffff" filter="url(#glow)" />
    <!-- Inner design - a subtle cross below the heart to represent the female symbol -->
    <rect x="-8" y="72" width="16" height="28" rx="4" fill="#ffffff" />
    <rect x="-20" y="80" width="40" height="16" rx="4" fill="#ffffff" />
  </g>
</svg>
